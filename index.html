<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avionase</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-shell">
  <header class="app-header">
    <span class="radar-dot"></span>
    <h1>AVIONASE</h1>
  </header>

  <!-- LOGIN -->
  <section id="screen-login" class="screen active">
    <div class="panel">
      <h2>Intra in joc</h2>
      <form id="login-form">
        <label for="username-input">Numele tau</label>
        <input id="username-input" type="text" maxlength="20" placeholder="ex: Costin" required>
        <button type="submit" class="btn-primary">Continua</button>
      </form>
    </div>
  </section>

  <!-- MENU -->
  <section id="screen-menu" class="screen">
    <div class="panel">
      <h2>Alege modul de joc</h2>

      <div class="difficulty-select">
        <p>Dificultate (pentru joc vs calculator):</p>
        <label><input type="radio" name="difficulty" value="easy"> Usor</label>
        <label><input type="radio" name="difficulty" value="medium" checked> Mediu</label>
        <label><input type="radio" name="difficulty" value="hard"> Greu</label>
      </div>

      <button id="btn-vs-ai" class="btn-primary">Joc vs Calculator</button>
      <button id="btn-vs-player" class="btn-secondary">Cauta un adversar (PvP)</button>
      <button id="btn-private-room" class="btn-secondary">Camera privata (invitatie)</button>
    </div>
  </section>

  <!-- PRIVATE ROOM -->
  <section id="screen-private-room" class="screen">
    <div class="panel">
      <h2>Camera privata</h2>

      <div class="room-block">
        <h3>Creeaza o camera</h3>
        <label for="room-password-input">Parola (optional)</label>
        <input id="room-password-input" type="text" placeholder="lasa gol pentru fara parola">
        <button id="btn-create-room" class="btn-primary">Creeaza</button>
        <p id="room-code-display" class="hint"></p>
      </div>

      <div class="room-block">
        <h3>Alatura-te unei camere</h3>
        <label for="room-code-input">Cod camera</label>
        <input id="room-code-input" type="text" maxlength="5" placeholder="ex: A7K3M">
        <label for="join-password-input">Parola (daca exista)</label>
        <input id="join-password-input" type="text">
        <button id="btn-join-room" class="btn-primary">Alatura-te</button>
        <p id="private-room-error" class="hint error"></p>
      </div>
    </div>
  </section>

  <!-- PLACEMENT -->
  <section id="screen-placement" class="screen">
    <div class="panel">
      <h2>Plaseaza-ti avioanele</h2>
      <p id="placement-status-text" class="hint"></p>
      <p id="placement-info" class="hint"></p>
      <div id="placement-board-container" class="board-grid"></div>
      <div class="placement-controls">
        <button id="btn-undo-ship" class="btn-secondary">Anuleaza ultimul avion</button>
        <button id="btn-confirm-placement" class="btn-primary" disabled>Confirma plasarea</button>
      </div>
      <p class="hint">Apasa <kbd>R</kbd> pentru a roti avionul inainte de plasare.</p>
    </div>
  </section>

  <!-- GAME -->
  <section id="screen-game" class="screen">
    <div class="panel panel-wide">
      <h2>Joc in desfasurare</h2>
      <p id="game-status" class="hint"></p>
      <div class="boards-row">
        <div class="board-col">
          <h3>Harta adversarului (ataca aici)</h3>
          <div id="enemy-board-container" class="board-grid"></div>
        </div>
        <div class="board-col">
          <h3>Harta ta</h3>
          <div id="own-board-container" class="board-grid"></div>
        </div>
      </div>
    </div>
  </section>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
